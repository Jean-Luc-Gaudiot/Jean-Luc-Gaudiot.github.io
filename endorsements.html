<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Endorsements</title>
    <script src="support_files/site-shell.js" defer></script>
    <script src="support_files/endorsements.js" type="module"></script>
    <script src="support_files/endorsement_entries.js" type="module"></script>
    <link href="support_files/endorse.css" rel="stylesheet" type="text/css">
</head>

<body data-page="endorsements" onload="loadMap()">
<script>
    function loadList() {
        var map = document.getElementById("map");
        var mapButton = document.getElementById("mapButton")
        var list = document.getElementById("list");
        var listButton = document.getElementById("listButton")
        map.hidden = true;
        mapButton.hidden = false;
        list.hidden = false;
        listButton.hidden = true;
    }

    function loadMap() {
        var map = document.getElementById("map");
        var mapButton = document.getElementById("mapButton")
        var list = document.getElementById("list");
        var listButton = document.getElementById("listButton")
        map.hidden = false;
        mapButton.hidden = true;
        list.hidden = true;
        listButton.hidden = false;
    }
</script>

<section class="bodySection" id="bodySection" style="font-family:'Times New Roman',serif ">
    <div id="site-nav"></div>
    <p style="font-size: 1.25em"><em><strong> I have been privileged with receiving the early support of some
        prominent members of our community. By clicking on the pins below, you
        will find their respective statements (if you are having trouble
        displaying the map, you can see the linear list by clicking <a href="#" onclick="loadList()">here </a> or by
        clicking the button below).</strong></em>
    </p>
    <button id="listButton" onclick="loadList()">List View</button>
    <button id="mapButton" onclick="loadMap()">Map View</button>
    <br/>
    <div class="map" id="map"></div>
    <script>
        (g => {
            var h, a, k, p = "The Google Maps JavaScript API", c = "google", l = "importLibrary", q = "__ib__",
                m = document, b = window;
            b = b[c] || (b[c] = {});
            var d = b.maps || (b.maps = {}), r = new Set, e = new URLSearchParams,
                u = () => h || (h = new Promise(async (f, n) => {
                    await (a = m.createElement("script"));
                    e.set("libraries", [...r] + "");
                    for (k in g) e.set(k.replace(/[A-Z]/g, t => "_" + t[0].toLowerCase()), g[k]);
                    e.set("callback", c + ".maps." + q);
                    a.src = `https://maps.${c}apis.com/maps/api/js?` + e;
                    d[q] = f;
                    a.onerror = () => h = n(Error(p + " could not load."));
                    a.nonce = m.querySelector("script[nonce]")?.nonce || "";
                    m.head.append(a)
                }));
            d[l] ? console.warn(p + " only loads once. Ignoring:", g) : d[l] = (f, ...n) => r.add(f) && u().then(() => d[l](f, ...n))
        })({
            key: "AIzaSyAnlP9yc1txR-x4Bq21SCGhDm4G4fn3W7s",
            v: "weekly",
        });
    </script>
    <script type="module">
        import {fillList} from "./support_files/endorsement_entries.js";

        fillList()
    </script>

    <div class="list" hidden="hidden" id="list"></div>

</section>

</body>

</html>
